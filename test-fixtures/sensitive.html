<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redact fixture — account page</title>
    <style>
      body { font: 16px system-ui, sans-serif; max-width: 640px; margin: 40px auto; }
      .row { margin: 8px 0; }
      .label { color: #666; display: inline-block; width: 120px; }
    </style>
  </head>
  <body>
    <h1>Account</h1>

    <!-- Targetable by CSS: .pii -->
    <div class="row"><span class="label">Name</span><span class="pii">Nguyễn Vĩnh Phước</span></div>
    <div class="row"><span class="label">Email</span><span class="pii">phaphpv@example.com</span></div>
    <div class="row"><span class="label">Card</span><span class="pii">4111 1111 1111 1111</span></div>

    <!-- Targetable by XPath: //div[@id="balance"] -->
    <div class="row"><span class="label">Balance</span><div id="balance">$12,345.67</div></div>

    <!-- Added after load to exercise the MutationObserver / SPA path. -->
    <div id="late"></div>
    <script>
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'pii';
        el.textContent = 'Late-rendered secret 9876';
        document.getElementById('late').appendChild(el);
      }, 1500);
    </script>
  </body>
</html>
